# DeckGym Training Configuration - Attention Enhanced v2
#
# COMPREHENSIVE PARAMETER ANALYSIS (2026-01-10)
# ============================================
#
# PROBLEM IDENTIFIED: Attention baseline had a massive bottleneck
# - 3.3M params in feature extractor → 200K params in policy head
# - This is like putting a Ferrari engine in a go-kart chassis
#
# This config fixes all identified issues:
# 1. Larger policy/value heads to match feature extractor capacity
# 2. Tuned pooling for better information flow
# 3. Optimized hyperparameters based on MLP success
#
# PARAMETER REASONING:
# --------------------
#
# attention_embed_dim: 256 (KEEP)
#   - 256 is proven to work well and explained variance is already 0.75
#   - Increasing would slow training without proportional benefit
#   - The bottleneck was in the HEADS, not the extractor
#
# attention_num_heads: 8 (KEEP)
#   - 8 heads with 256 dim = 32 dim per head (standard)
#   - More heads = more diverse attention patterns
#   - 8 is the sweet spot for this embed_dim
#
# attention_num_layers: 3 (KEEP)
#   - 3 layers is sufficient for 18 cards
#   - More layers = slower + gradient issues without clear benefit
#   - Attention baseline's 0.75 explained variance proves this works
#
# attention_pool_queries: 4 → 6 (INCREASE)
#   - More queries = richer pooled representation
#   - 4 queries compresses 18 cards → 4 vectors
#   - 6 queries allows more diverse card groupings
#   - Increases output from 512 to 768 dims (before output_proj)
#
# attention_output_proj_factor: 2 → 3 (INCREASE)
#   - Controls output size: embed_dim * factor = 256 * 3 = 768
#   - Larger output = more information flows to policy head
#   - This directly addresses the bottleneck
#
# attention_global_proj_dim: 128 → 192 (INCREASE)
#   - Global features (turn, points, etc.) need representation
#   - 128 was probably too small relative to card representation
#   - Total features_dim: 192 + 768 = 960 (vs old 640)
#
# attention_dropout: 0.1 (KEEP)
#   - 0.1 is standard for transformers
#   - Helps regularization without hurting learning
#
# attention_temperature: 1.0 (KEEP)
#   - 1.0 is standard, stats showed no saturation
#   - Only increase if seeing saturation (logit_std >> 10)
#
# attention_init_residual_scale: true (KEEP)
#   - Scales residual branches for stable gradient flow
#   - Critical for deep transformers
#
# attention_ff_expansion_factor: 4 (KEEP)
#   - Standard transformer: FF dim = 4 * embed_dim
#   - No reason to change
#
# policy_layers: [512, 256, 128] → [512, 384, 256] (WIDENED)
#   - Problem: Old [256, 128] was only 200K params
#   - New: [512, 384, 256] gives ~500K+ params
#   - The policy head is where decisions happen - needs capacity!
#   - Width > depth for RL (better gradient flow)
#
# value_layers: [512, 256] → [512, 384] (WIDENED)
#   - Value head benefits from similar capacity
#   - Wider layers for better value estimation
#
# use_gradient_checkpointing: false (KEEP)
#   - Not needed for current model size
#   - Only enable if OOM with larger models
#
# PPO HYPERPARAMETERS:
# --------------------
#
# learning_rate: 2e-5 (INCREASED from 1e-5)
#   - MLP uses 3e-5 successfully
#   - Attention is more complex, so 2e-5 is a good middle ground
#   - Too low = slow convergence (baseline problem)
#
# n_steps: 128 (DOUBLED from 64)
#   - Larger rollout buffer = better advantage estimation
#   - MLP uses 128 successfully
#   - More stable gradients
#
# batch_size: 2048 (DOUBLED from 1024)
#   - Larger batches = more stable gradients
#   - MLP uses 2048 successfully
#   - Good for attention's complex gradients
#
# n_epochs: 6 (REDUCED from 8)
#   - With larger LR, fewer epochs prevents overshooting
#   - Also faster training per rollout
#
# ent_coef: 0.025 (SLIGHTLY INCREASED from 0.02)
#   - Slightly more exploration to prevent exploitation overfitting
#   - MLP uses 0.03, we use 0.025 as middle ground
#
# target_kl: 0.012 (REDUCED from 0.015)
#   - Slightly stricter to prevent policy collapse
#   - Early stopping if updates are too aggressive

paths:
  meta_deck_path: "meta_deck.json"
  save_path: "models/attention_enhanced"
  checkpoint_dir: "./checkpoints/attention_enhanced/"
  tensorboard_dir: "./logs/attention_enhanced/"
  resume_path: null

model:
  use_attention: true
  
  # Core attention architecture (proven to generalize well)
  attention_embed_dim: 256
  attention_num_heads: 8
  attention_num_layers: 3
  
  # INCREASED: More pooling queries for richer representation
  attention_pool_queries: 6        # was 4: more card groupings
  
  # INCREASED: Larger output projection to avoid bottleneck
  attention_output_proj_factor: 3  # was 2: 256*3=768 output dims
  
  # INCREASED: Larger global projection
  attention_global_proj_dim: 192   # was 128: better global features
  
  # Standard transformer settings (keep)
  attention_ff_expansion_factor: 4
  attention_mask_threshold: 1e-06
  
  # Stability parameters (keep - working well)
  attention_dropout: 0.1
  attention_temperature: 1.0
  attention_init_residual_scale: true
  
  use_silu: true

  # WIDER policy/value heads - THE CRITICAL FIX
  # Old [256, 128] = 200K params → massive bottleneck
  # New [512, 384, 256] = 500K+ params → proper capacity
  net_arch:
    pi: [512, 384, 256]
    vf: [512, 384]

ppo:
  # INCREASED: Faster learning (was too conservative)
  learning_rate: 2e-05
  min_learning_rate: 1e-06
  warmup_ratio: 0.02

  # DOUBLED: Larger rollouts and batches for stability
  n_steps: 128
  batch_size: 2048
  
  # REDUCED: Fewer epochs with higher LR
  n_epochs: 6

  gamma: 0.98
  gae_lambda: 0.95
  
  # SLIGHTLY INCREASED: More exploration
  ent_coef: 0.025
  vf_coef: 0.5
  clip_range: 0.2
  max_grad_norm: 1.0
  
  # SLIGHTLY REDUCED: Stricter early stopping
  target_kl: 0.012

training:
  total_timesteps: 30000000
  checkpoint_freq: 2000
  n_envs: 128
  use_batched_env: true
  device: "auto"
  onnx_device: "auto"
  pfsp_opponent_device: "trt"
  frozen_opponent_update_rollouts: 8
  
  # No gradient checkpointing needed for this model size
  use_gradient_checkpointing: false

  # PFSP settings (uses default curriculum from config.py)
  # Curriculum: o2 (coherence) → o1 (anti-exploit) → e2 (boss)
  use_pfsp: true
  pfsp_pool_size: 10
  pfsp_add_every_n_rollouts: 8
  pfsp_select_every_n_rollouts: 2
  pfsp_priority_exponent: 2.0
  pfsp_winrate_window: 200
  pfsp_checkpoint_dir: "./checkpoints/attention_enhanced/pfsp_pool/"

environment:
  max_turns: 99
  max_actions_per_turn: 50
  max_total_actions: 1000
