# Baseline Model Configuration (Run #1)
# Small attention model: ~2-3M parameters
# Used for initial training run (17M steps, plateaued at 47% WR)

model:
  attention_embed_dim: 256
  attention_num_heads: 4
  attention_num_layers: 2
  use_attention: true
  use_silu: true

ppo:
  learning_rate: 5.0e-5
  min_learning_rate: 1.0e-5
  batch_size: 2048
  n_steps: 8192
  n_epochs: 8
  gamma: 0.98
  gae_lambda: 0.95
  ent_coef: 0.02
  vf_coef: 0.5
  clip_range: 0.2
  target_kl: 0.025

training:
  total_timesteps: 30000000
  checkpoint_freq: 100000
  n_envs: 32
  use_batched_env: true
  device: "auto"
  frozen_opponent_update_freq: 75000
  adaptive_frozen_opponent: true
  target_win_rate: 0.55

environment:
  max_turns: 99
  max_actions_per_turn: 50
  max_total_actions: 500

paths:
  simple_deck_path: "simple_deck.json"
  meta_deck_path: "meta_deck.json"
  save_path: "models/rl_bot_baseline"
  checkpoint_dir: "./checkpoints/baseline/"
  tensorboard_dir: "./logs/"
  resume_path: null
