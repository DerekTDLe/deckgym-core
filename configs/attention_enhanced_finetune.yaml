# DeckGym Training Configuration - Attention Enhanced Fine-tuning
#
# Purpose: Fine-tune the attention_enhanced model for better performance.
# Strategy: 
# - Lower learning rate (4x reduction)
# - Lower entropy (focus on learned strategies)
# - Tighter KL constraint (conservative updates)
# - Higher PFSP priority on hard opponents
#
# IMPORTANT: Architecture params MUST match attention_enhanced.yaml exactly 
# to ensure weights load correctly.

paths:
  meta_deck_path: "meta_deck.json"
  save_path: "models/attention_enhanced_finetune"
  checkpoint_dir: "./checkpoints/attention_enhanced_finetune/"
  tensorboard_dir: "./logs/attention_enhanced_finetune/"
  resume_path: "models/attention_enhanced.zip"

model:
  use_attention: true
  
  # Core attention architecture (MUST MATCH attention_enhanced.yaml)
  attention_embed_dim: 256
  attention_num_heads: 8
  attention_num_layers: 3
  attention_pool_queries: 6
  attention_output_proj_factor: 3
  attention_global_proj_dim: 192
  
  # Standard transformer settings
  attention_ff_expansion_factor: 4
  attention_mask_threshold: 1e-06
  
  # Stability parameters - slightly reduced dropout for fine-tuning
  attention_dropout: 0.05
  attention_temperature: 1.0
  attention_init_residual_scale: true
  
  use_silu: true

  # Policy/value heads (MUST MATCH attention_enhanced.yaml)
  net_arch:
    pi: [512, 384, 256]
    vf: [512, 384]

ppo:
  # Fine-tuning: lower learning rate (was 2e-5)
  learning_rate: 5e-06
  min_learning_rate: 1e-06
  warmup_ratio: 0.05

  # Rollouts and batches
  n_steps: 128
  batch_size: 2048
  
  # Reduced epochs for stability (was 6)
  n_epochs: 4

  gamma: 0.99 # Slightly higher for long-term refinement
  gae_lambda: 0.95
  
  # Reduced entropy: exploit learned knowledge (was 0.025)
  ent_coef: 0.01
  vf_coef: 0.5
  clip_range: 0.1 # Tighter clipping (was 0.2)
  max_grad_norm: 0.5 # More aggressive clipping (was 1.0)
  
  # Still enable medium policy shift
  target_kl: 0.012

training:
  total_timesteps: 10000000
  checkpoint_freq: 2000
  n_envs: 128
  use_batched_env: true
  device: "auto"
  onnx_device: "auto"
  pfsp_opponent_device: "auto"
  frozen_opponent_update_rollouts: 4 # More frequent updates
  brutal_resume: true

  # PFSP settings - focus on hard opponents
  use_pfsp: true
  pfsp_pool_size: 10
  pfsp_add_every_n_rollouts: 8
  pfsp_select_every_n_rollouts: 2
  pfsp_priority_exponent: 3.0 # Focus more on harder opponents (was 2.0)
  pfsp_winrate_window: 300
  pfsp_checkpoint_dir: "./checkpoints/attention_enhanced_finetune/pfsp_pool/"

environment:
  max_turns: 99
  max_actions_per_turn: 50
  max_total_actions: 1000
