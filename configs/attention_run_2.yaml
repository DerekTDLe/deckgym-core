# DeckGym Training Configuration
# Generated template - customize as needed

paths:
  meta_deck_path: "meta_deck.json"
  save_path: "models/attention_run_2"
  checkpoint_dir: "./checkpoints/attention_run_2/"
  tensorboard_dir: "./logs/attention_run_2/"
  resume_path: null

model:
  use_attention: true
  attention_embed_dim: 256
  attention_num_heads: 8
  attention_num_layers: 3
  attention_global_proj_dim: 128
  attention_ff_expansion_factor: 4
  attention_output_proj_factor: 2
  attention_mask_threshold: 1e-06
  
  # Stability parameters
  attention_dropout: 0.1
  attention_pool_queries: 4
  attention_temperature: 1.0
  attention_init_residual_scale: true
  
  use_silu: true

  net_arch:
    pi: [256, 128]
    vf: [256, 128]

ppo:
  learning_rate: 1e-05
  min_learning_rate: 1e-06
  warmup_ratio: 0.02

  n_steps: 64 # less steps to compensate for move envs
  batch_size: 1024
  n_epochs: 8

  gamma: 0.98
  gae_lambda: 0.95
  ent_coef: 0.02
  vf_coef: 0.5
  clip_range: 0.2
  max_grad_norm: 1.0
  target_kl: 0.015

training:
  total_timesteps: 30000000
  checkpoint_freq: 2000 # times n-envs = 256000 (keep a frequent trace of progression)
  n_envs: 128 # more env to use the GPU efficiently
  use_batched_env: true
  device: "auto"
  onnx_device: "auto"
  pfsp_opponent_device: "trt" # GPU wont OOM with current settings
  frozen_opponent_update_rollouts: 8

  # PFSP settings
  use_pfsp: true
  pfsp_pool_size: 8 # Avoid OOM
  pfsp_add_every_n_rollouts: 8
  pfsp_select_every_n_rollouts: 2
  pfsp_priority_exponent: 2.0
  pfsp_winrate_window: 200
  pfsp_checkpoint_dir: "./checkpoints/attention_run_2/pfsp_pool/"

environment:
  max_turns: 99
  max_actions_per_turn: 50
  max_total_actions: 1000
