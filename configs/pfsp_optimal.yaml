# PFSP (Prioritized Fictitious Self-Play) Configuration
# State-of-the-art training for Pokemon TCG Pocket RL Agent
#
# This config implements AlphaStar-style league training where the agent
# trains against a pool of historical checkpoints, prioritizing harder opponents.
#
# Expected performance: 1950-2050 ELO @ 30M steps

paths:
  meta_deck_path: "meta_deck.json"
  save_path: "models/rl_bot_pfsp"
  checkpoint_dir: "./checkpoints/pfsp_training/"
  tensorboard_dir: "./logs/pfsp/"
  resume_path: null  # Set to checkpoint path to resume training

model:
  # Modern Transformer architecture (3 layers, 8 heads, GELU)
  use_attention: true
  attention_embed_dim: 256          # Card embedding dimension
  attention_num_heads: 8            # Multi-head attention (increased from 4)
  attention_num_layers: 3           # Transformer depth (increased from 2)
  use_silu: true                    # SiLU activation for smoother gradients

  # Policy/Value heads (post-attention)
  net_arch:
    pi: [512, 256, 128]             # Policy network
    vf: [512, 256]                  # Value network

ppo:
  # Optimized hyperparameters for attention + short episodes (37 steps)
  learning_rate: 3e-4               # Standard PPO (6× higher than previous 5e-5)
  min_learning_rate: 1e-4           # Final LR after decay
  warmup_ratio: 0.02                # 2% warmup for attention stability

  # Critical: n_steps adapted to episode length
  n_steps: 512                      # 14× episode length (vs 220× before!)
                                    # → 111 episodes per rollout (vs 7000 before)
                                    # → 16× more gradient updates per 1M steps

  batch_size: 1024                  # 512×32/16 = 1024 per batch
  n_epochs: 10                      # Slightly more epochs for smaller rollouts

  # Standard PPO parameters
  gamma: 0.98                       # Good for 37-step episodes
  gae_lambda: 0.95
  ent_coef: 0.06                    # Higher for exploration (was 0.02)
  vf_coef: 0.5
  clip_range: 0.2
  max_grad_norm: 1.0                # Gradient clipping (critical for attention)
  target_kl: 0.02                   # Early stopping if KL divergence too high

training:
  total_timesteps: 30_000_000
  checkpoint_freq: 50_000           # More frequent checkpoints for analysis
  n_envs: 32                        # Optimal for 1 GPU
  use_batched_env: true             # Use Rust-side batching (7000+ steps/sec)
  device: "auto"

  # PFSP (Prioritized Fictitious Self-Play) - ENABLED
  use_pfsp: true                    # Enable PFSP instead of simple frozen opponent
  frozen_opponent_update_rollouts: 8  # Fallback if use_pfsp=false

  # PFSP Parameters
  pfsp_pool_size: 10                # Keep 10 historical checkpoints
  pfsp_add_every_n_rollouts: 8      # Add agent to pool every 8 rollouts (~60k steps)
  pfsp_select_every_n_rollouts: 2   # Select new opponent every 2 rollouts (~15k steps)
  pfsp_priority_exponent: 2.0       # f(x) = (1-x)^2 : focus on hard opponents
                                    # Higher = more focus on hard opponents (range: 1.0-3.0)
  pfsp_winrate_window: 200          # Track winrate over 200 recent episodes
  pfsp_checkpoint_dir: "./checkpoints/pfsp_pool/"  # Where to save PFSP opponents

environment:
  max_turns: 99                     # Official Pokemon TCG Pocket limit
  max_actions_per_turn: 50
  max_total_actions: 500

# =============================================================================
# Performance Expectations
# =============================================================================
#
# With these settings, expect:
# - 5M steps:  ~1800 ELO (learning meta)
# - 15M steps: ~1900 ELO (beating e2 consistently)
# - 30M steps: ~1950-2000 ELO (approaching e3)
# - 50M steps: ~2000-2050 ELO (state-of-the-art)
#
# Key improvements over baseline:
# - PFSP: +100-150 ELO (vs simple frozen opponent)
# - n_steps=512: +50-100 ELO (vs n_steps=8192)
# - LR=3e-4: +50 ELO (vs LR=5e-5)
# - 8 attention heads: +30-50 ELO (vs 4 heads)
#
# Total expected improvement: +200-300 ELO
#
# =============================================================================
# Training Command
# =============================================================================
#
# python python/scripts/train.py --config configs/pfsp_optimal.yaml
#
# Monitor with TensorBoard:
# tensorboard --logdir ./logs/pfsp/
#
# Evaluate checkpoints:
# python python/scripts/evaluate.py eval --model checkpoints/pfsp_training/rl_bot_xxx_steps.zip --games 300
