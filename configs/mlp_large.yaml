# Large MLP Configuration (Pure MLP, No Attention)
# Goal: Test if pure MLP with more capacity can match attention model
# Target: 8-10M parameters through wider/deeper MLP layers

model:
  # Disable attention - use pure MLP
  use_attention: false
  
  # MLP architecture: wider and deeper layers
  # Observation size: 2849 → need large first layer
  net_arch:
    pi: [2048, 1024, 512, 256]  # Policy network: 4 layers
    vf: [2048, 1024, 512]        # Value network: 3 layers
  
  # Activation function
  activation_fn: "relu"  # or "tanh"

ppo:
  # Learning rate with linear decay
  learning_rate: 1.0e-4      # Higher LR for faster convergence
  min_learning_rate: 1.0e-5
  
  # Batch size and training steps
  batch_size: 2048
  n_steps: 8192
  n_epochs: 10  # More epochs for better sample efficiency
  
  # PPO hyperparameters
  gamma: 0.98
  gae_lambda: 0.95
  ent_coef: 0.03   # Higher entropy for more exploration
  vf_coef: 0.8     # Higher value function weight
  clip_range: 0.2
  target_kl: 0.025

training:
  total_timesteps: 30000000
  checkpoint_freq: 50000
  n_envs: 32
  use_batched_env: true
  device: "auto"

curriculum:
  enabled: true
  initial_stage: "warmup"
  win_rate_threshold: 0.55
  games_per_eval: 50
  eval_frequency: 100000

frozen_opponent:
  enabled: true
  update_frequency: 75000
  export_onnx: true

paths:
  simple_deck_path: "simple_deck.json"
  meta_deck_path: "meta_deck.json"
  save_path: "models/rl_bot_mlp_large"
  checkpoint_dir: "./checkpoints/mlp_large/"
  tensorboard_dir: "./logs/"
  resume_path: null

# Expected model size:
# Input → Hidden1: 2849 × 2048 = 5.8M params
# Hidden1 → Hidden2: 2048 × 1024 = 2.1M params
# Hidden2 → Hidden3: 1024 × 512 = 0.5M params
# Hidden3 → Hidden4: 512 × 256 = 0.13M params
# Hidden4 → Output: 256 × 175 = 0.04M params
# Total: ~8.6M parameters (policy + value)
