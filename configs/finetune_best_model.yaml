# DeckGym Training Configuration - Fine-tuning Best Model
# Architecture: Same as attention_baseline (required for weight compatibility)
# Purpose: Fine-tune best_model_26624k_steps to reach SOTA
#
# Fine-tuning strategy:
# - Lower learning rate for stable refinement
# - Lower entropy for more exploitation
# - Tighter KL constraint for conservative updates
# - Longer training with frequent checkpoints
#
# IMPORTANT: Architecture params MUST match the original model
# (embed_dim=256, heads=8, layers=3) or weights won't load correctly

# Dev note : the fine-tuned model should be already "baked" and this config assume that is it
# if not, another config should be used

paths:
  meta_deck_path: "meta_deck.json"
  save_path: "models/finetune_sota"
  checkpoint_dir: "./checkpoints/finetune_sota/"
  tensorboard_dir: "./logs/finetune_sota/"
  resume_path: "models/attention_baseline/best_model_26624k_steps.zip"

model:
  # Must match original model architecture exactly
  use_attention: true
  attention_embed_dim: 256
  attention_num_heads: 8
  attention_num_layers: 3
  attention_global_proj_dim: 128
  attention_ff_expansion_factor: 4
  attention_output_proj_factor: 2
  attention_mask_threshold: 1e-06

  # Stability parameters - slightly reduced dropout for fine-tuning
  attention_dropout: 0.05  # Lower dropout during fine-tuning
  attention_pool_queries: 4
  attention_temperature: 1.0
  attention_init_residual_scale: true

  use_silu: true

  # Must match original architecture
  net_arch:
    pi: [256, 128]
    vf: [256, 128]

ppo:
  # Fine-tuning: much lower learning rate
  learning_rate: 2e-06  # 5x lower than original
  min_learning_rate: 5e-07  # Lower floor
  warmup_ratio: 0.05  # Longer warmup (5%)

  n_steps: 128  # More steps for stable gradients
  batch_size: 512  # Smaller batches for more updates
  n_epochs: 4  # Fewer epochs to prevent overfitting per rollout

  gamma: 0.99  # Slightly higher for long-term strategy
  gae_lambda: 0.95
  ent_coef: 0.005  # Much lower entropy - exploit learned knowledge
  vf_coef: 0.5
  clip_range: 0.1  # Tighter clipping for conservative updates
  max_grad_norm: 0.5  # More aggressive gradient clipping
  target_kl: 0.005  # Very tight KL constraint - stop early if diverging

training:
  total_timesteps: 10000000  # 10M more steps
  checkpoint_freq: 1000  # More frequent checkpoints
  brutal_resume: true
  n_envs: 128
  use_batched_env: true
  device: "auto"
  onnx_device: "auto"
  pfsp_opponent_device: "trt"
  frozen_opponent_update_rollouts: 4  # More frequent opponent updates

  # PFSP settings - focus on hard opponents
  use_pfsp: true
  pfsp_pool_size: 12  # Larger pool for diversity
  pfsp_add_every_n_rollouts: 4  # Add more frequently
  pfsp_select_every_n_rollouts: 1  # Select every rollout
  pfsp_priority_exponent: 3.0  # Higher exponent = focus on hard opponents
  pfsp_winrate_window: 300  # Longer window for stable estimates
  pfsp_checkpoint_dir: "./checkpoints/finetune_sota/pfsp_pool/"

environment:
  max_turns: 99
  max_actions_per_turn: 50
  max_total_actions: 1000
